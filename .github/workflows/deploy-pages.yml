# 工作流名称（可改）
name: 部署 Astro 到 GitHub Pages

# 触发条件（可改）
on:
  # 当 push 到 main 分支时触发（可改分支名）
  push:
    branches: [main]

  # 允许在 GitHub Actions 页面手动运行
  workflow_dispatch:

# GitHub Actions 权限（一般不用改）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发配置（一般不用改）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # 运行环境（可改 ubuntu/windows/mac）
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 配置 Node.js
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          # Node 版本（建议可改）
          node-version: 22

          # npm 缓存
          cache: npm

      # 安装依赖
      - name: 安装依赖
        run: npm ci

      # Astro 构建命令（最常改）
      - name: 构建 Astro 项目
        run: npm run build

      # 配置 GitHub Pages
      - name: 配置 Pages
        uses: actions/configure-pages@v5

      # 上传构建产物
      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro 默认输出目录（可改）
          path: dist

      # 部署到 GitHub Pages
      - name: 部署 Pages
        uses: actions/deploy-pages@v4